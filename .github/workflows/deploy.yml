name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer (production)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Deploy files (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr
            --delete
            --exclude=.git
            --exclude=.github
            --exclude=.env
            --exclude=.env.*
            --exclude=node_modules
            --exclude=tests
            --exclude=storage
            --exclude=database/*.sqlite
            --exclude=database/*.sqlite-journal
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_port: ${{ env.DEPLOY_PORT != '' && env.DEPLOY_PORT || '22' }}

      - name: Post-deploy (SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT != '' && env.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            bash deploy/remote-post-deploy.sh
